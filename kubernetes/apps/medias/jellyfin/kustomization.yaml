apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: medias

resources:
  - nfs-pv.yaml
  - ingress.yaml

helmCharts:
  - name: jellyfin
    repo: https://jellyfin.github.io/jellyfin-helm
    namespace: medias
    releaseName: jellyfin
    valuesFile: values.yaml
    version: 3.2.0

patches:
  - path: cache-emptydir-patch.yaml
    target:
      kind: Deployment
      name: jellyfin
