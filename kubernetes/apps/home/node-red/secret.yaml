apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: nodered
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: nodered
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: k8s/dorado/applications/node-red
