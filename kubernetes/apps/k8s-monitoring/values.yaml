cluster:
  name: dorado

destinations:
  logs:
    type: loki
    url: http://loki.monitoring.svc.cluster.local/loki/api/v1/push
    tenantId: dorado
  metrics:
    type: prometheus
    url: http://mimir.monitoring.svc.cluster.local/api/v1/push
    tenantId: dorado

# Enable cluster metrics (includes kube-state-metrics, kubelet, cAdvisor)
clusterMetrics:
  enabled: true
  collector: alloy-metrics

# Enable cluster events collection
clusterEvents:
  enabled: true
  collector: alloy-singleton

# Enable pod logs collection (renamed from podLogs)
podLogsViaLoki:
  enabled: true
  collector: alloy-logs

# Enable annotation-based autodiscovery for metrics
annotationAutodiscovery:
  enabled: true
  collector: alloy-metrics

# Enable Prometheus Operator objects (ServiceMonitors, PodMonitors, Probes)
prometheusOperatorObjects:
  enabled: true
  collector: alloy-metrics

# Define collectors (required in v4.0.0)
collectors:
  # Metrics collector (StatefulSet for cluster metrics, ServiceMonitors, etc.)
  alloy-metrics:
    presets: [clustered, statefulset]

  # Logs collector (DaemonSet for pod logs)
  alloy-logs:
    presets: [daemonset, filesystem-log-reader]

  # Singleton collector (single replica for cluster events)
  alloy-singleton:
    presets: [singleton]

# Deploy supporting services
telemetryServices:
  # Deploy kube-state-metrics for cluster state metrics
  kube-state-metrics:
    deploy: true

  # Deploy node-exporter for host metrics
  node-exporter:
    deploy: true

# Disable self-reporting
selfReporting:
  enabled: false
