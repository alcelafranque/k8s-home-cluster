global:
  envFrom:
    - secretRef:
        name: authentik-secret

authentik:
  postgresql:
    # CNPG cluster (see postgresql-authentik.yaml); db/user default to "authentik",
    # password comes from authentik-secret via envFrom
    host: authentik-postgres-rw.authentik.svc.cluster.local

server:
  ingress:
    enabled: false
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 1024Mi

worker:
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 1024Mi

