controllers:
  main:
    containers:
      main:
        image:
          repository: ghcr.io/immich-app/immich-server
          tag: v3.0.3
        env:
          REDIS_HOSTNAME: dragonfly.dragonfly.svc.cluster.local
          REDIS_PORT: "6379"
          REDIS_DBINDEX: "2"
          DB_HOSTNAME: immich-postgres-rw
          DB_USERNAME: immich
          DB_DATABASE_NAME: immich
          DB_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: immich-db-secret
                key: password

immich:
  metrics:
    enabled: true
  persistence:
    library:
      existingClaim: immich-library-pvc

server:
  enabled: true
  # image/env come from the shared top-level controllers block
  controllers:
    main:
      containers:
        main:
          resources:
            requests:
              memory: 256Mi
            limits:
              memory: 2Gi
  ingress:
    main:
      enabled: false

machine-learning:
  enabled: true
  controllers:
    main:
      containers:
        main:
          resources:
            requests:
              memory: 512Mi
            limits:
              memory: 4Gi
  persistence:
    cache:
      enabled: true
      size: 20Gi
      type: persistentVolumeClaim
      accessMode: ReadWriteOnce
