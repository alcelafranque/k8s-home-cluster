apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: immich-db-secret
  annotations:
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: immich-db-secret
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: k8s/dorado/applications/immich-db
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: s3-immich
  annotations:
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: s3-immich
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: k8s/dorado/applications/s3-immich
