apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: immich-postgres
  namespace: immich
spec:
  instances: 1
  # VectorChord (successor of pgvecto.rs, required by immich >= 3.0)
  imageName: ghcr.io/tensorchord/cloudnative-vectorchord:16.14-1.1.1
  enableSuperuserAccess: true
  primaryUpdateStrategy: unsupervised
  primaryUpdateMethod: restart ##@@ Cannot use switchover with 1 instance
  postgresql:
    shared_preload_libraries:
      - "vchord.so"
    enableAlterSystem: true
  bootstrap:
    initdb:
      database: immich
      owner: immich
      secret:
        name: immich-db-secret
      dataChecksums: true
      postInitApplicationSQL:
        - CREATE EXTENSION IF NOT EXISTS "vchord" CASCADE;
        - CREATE EXTENSION IF NOT EXISTS "cube";
        - CREATE EXTENSION IF NOT EXISTS "earthdistance";
        - GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO "immich";

  storage:
    size: 10Gi

  managed:
    roles:
      - name: immich
        ensure: present
        superuser: true
        login: true
        passwordSecret:
          name: immich-db-secret

  backup:
    barmanObjectStore:
      destinationPath: "s3://backup-k8s-psql-immich"
      endpointURL: "https://s3-2-mdz.lac-coloc.fr"
      s3Credentials:
        accessKeyId:
          name: s3-immich
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: s3-immich
          key: ACCESS_SECRET_KEY
      data:
        compression: bzip2
      wal:
        compression: bzip2
    retentionPolicy: "30d"
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: immich-postgres
spec:
  # CNPG cron has 6 fields (seconds first): daily base backup at 03:12:11
  schedule: "11 12 3 * * *"
  backupOwnerReference: self
  cluster:
    name: immich-postgres
