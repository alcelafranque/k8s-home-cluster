apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argocd

resources:
  - namespace.yaml
  # upstream cluster-wide install, same source as `kubectl apply -f install.yaml`
  - https://github.com/argoproj/argo-cd//manifests/cluster-install?ref=v3.0.5
  # one Application per app dir + argocd self-management
  - ./apps

patches:
  - path: argocd-cm-patch.yaml
