apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: cloudflare
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: k8s/dorado/applications/cloudflare-api
