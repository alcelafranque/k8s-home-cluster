---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: domain-locker
  namespace: domain-locker
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/icon: mdi-lock-outline
    gethomepage.dev/name: Domain Locker
    gethomepage.dev/description: "Domain registration and management"
    gethomepage.dev/group: Tools
spec:
  parentRefs:
  - name: one-gateway-for-all
    namespace: envoy-gateway-system
    sectionName: https
  hostnames:
  - domain-locker.com
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: domain-locker
      port: 80
---
# HTTPRoute pour HTTP (redirection 301)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: domain-locker-http-redirect
  namespace: domain-locker
spec:
  parentRefs:
  - name: one-gateway-for-all
    namespace: envoy-gateway-system
    sectionName: http
  hostnames:
  - domain-locker.com
  rules:
  - filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        statusCode: 301
