librenms:
  existingSecret: librenms
  timezone: UTC
  configuration: |
    $config['base_url']                          = 'https://librenms.as62430.net';
    $config['distributed_poller_group']          = '0';
    $config['distributed_poller']                = true;
  extraEnvs:
    - name: APP_URL
      value: https://librenms.as62430.net
    - name: APP_TRUSTED_PROXIES
      value: "*"

  # Global setting to run components as privileged, set as a bool
  # Optionally, the frontend and pollers can be individually run as privileged
  privileged: false

  frontend:
    replicas: 1
    resources:
      requests:
        memory: 256Mi
      limits:
        memory: 1Gi

  poller:
    replicas: 1
    privileged: false
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        memory: 1Gi

  snmp_scanner:
    enabled: false


  rrdcached:
    persistence:
      enabled: true
      journal:
        size: 2Gi
      rrdcached:
        size: 30Gi
    envs:
    - name: TZ
      value: "Europe/Paris"
    - name: WRITE_JITTER
      value: '1800'
    - name: WRITE_TIMEOUT
      value: '1800'

ingress:
  enabled: false

mysql:
  enabled: true
  existingAuthSecret:
    name: librenms
    key: mysql-user-password
  auth:
    username: librenms
    database: librenms
    existingSecret: librenms

redis:
  enabled: true
