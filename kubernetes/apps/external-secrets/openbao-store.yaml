apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: openbao
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  provider:
    vault:
      server: https://openbao.lac-coloc.fr
      path: kv
      version: v2
      auth:
        appRole:
          path: approle
          roleId: 96e0139c-f7b5-edaf-2f5a-dbfca83db80b
          secretRef:
            name: openbao-approle
            namespace: external-secrets
            key: secret-id
