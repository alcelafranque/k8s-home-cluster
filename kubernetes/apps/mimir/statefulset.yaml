kind: StatefulSet
apiVersion: apps/v1
metadata:
  name: mimir
  labels:
    app: mimir
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mimir
  template:
    metadata:
      labels:
        app: mimir
    spec:
      terminationGracePeriodSeconds: 10
      containers:
        - name: mimir
          image: docker.io/grafana/mimir:3.1.3
          args:
            - "-target=all"
            - "-config.file=/etc/mimir/mimir.yaml"
            - "-config.expand-env=true"
          envFrom:
            - secretRef:
                name: mimir
          resources:
            requests:
              cpu: 200m
              memory: 1Gi
            limits:
              memory: 3Gi
          volumeMounts:
            - name: config
              mountPath: /etc/mimir
            - name: storage
              mountPath: /data
          ports:
            - name: mimir
              containerPort: 9009
          readinessProbe:
            httpGet:
              path: /ready
              port: mimir
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /ready
              port: mimir
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 10
      volumes:
        - name: config
          configMap:
            name: mimir-config
  volumeClaimTemplates:
    - metadata:
        name: storage
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: "10Gi"



